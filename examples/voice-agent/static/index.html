<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Voice AI Agent</title>
        <style>
            /* ── Reset & base ─────────────────────────────────────────── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0d0f14;
                --surface: #161a23;
                --surface2: #1e2330;
                --border: #2a3044;
                --primary: #6c63ff;
                --primary-glow: #6c63ff55;
                --danger: #ff4f70;
                --danger-glow: #ff4f7055;
                --success: #3df2a0;
                --text: #e8eaf6;
                --muted: #7b82a0;
                --user-bubble: #252d42;
                --ai-bubble: #1a2035;
                --radius: 14px;
                --font: "Segoe UI", system-ui, -apple-system, sans-serif;
            }

            html,
            body {
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: var(--font);
                font-size: 15px;
                line-height: 1.55;
                overflow: hidden;
            }

            /* ── Layout ───────────────────────────────────────────────── */
            #app {
                display: flex;
                flex-direction: column;
                height: 100dvh;
                max-width: 780px;
                margin: 0 auto;
            }

            /* ── Header ───────────────────────────────────────────────── */
            header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 16px 20px;
                border-bottom: 1px solid var(--border);
                background: var(--surface);
                flex-shrink: 0;
            }

            .logo {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 17px;
                font-weight: 700;
                letter-spacing: -0.3px;
            }

            .logo-icon {
                width: 34px;
                height: 34px;
                background: linear-gradient(135deg, var(--primary), #a78bfa);
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 17px;
            }

            .header-right {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            /* status pill */
            #status {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 5px 12px;
                border-radius: 100px;
                font-size: 12px;
                font-weight: 600;
                letter-spacing: 0.4px;
                text-transform: uppercase;
                transition:
                    background 0.3s,
                    color 0.3s;
            }
            #status::before {
                content: "";
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: currentColor;
            }
            #status.connecting {
                background: #2a2d3a;
                color: var(--muted);
            }
            #status.ready {
                background: #0f2a1e;
                color: var(--success);
            }
            #status.recording {
                background: #2a1520;
                color: var(--danger);
                animation: pulse-status 1s infinite;
            }
            #status.processing {
                background: #1a1a2e;
                color: var(--primary);
            }
            #status.error {
                background: #2a1520;
                color: var(--danger);
            }

            @keyframes pulse-status {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.5;
                }
            }

            /* reset button */
            #resetBtn {
                background: transparent;
                border: 1px solid var(--border);
                color: var(--muted);
                padding: 5px 12px;
                border-radius: 8px;
                cursor: pointer;
                font-size: 12px;
                font-family: var(--font);
                transition:
                    border-color 0.2s,
                    color 0.2s;
            }
            #resetBtn:hover {
                border-color: var(--primary);
                color: var(--text);
            }

            /* ── Chat area ────────────────────────────────────────────── */
            #chat {
                flex: 1;
                overflow-y: auto;
                padding: 20px;
                display: flex;
                flex-direction: column;
                gap: 16px;
                scroll-behavior: smooth;
            }

            #chat::-webkit-scrollbar {
                width: 5px;
            }
            #chat::-webkit-scrollbar-track {
                background: transparent;
            }
            #chat::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 3px;
            }

            /* empty state */
            #emptyState {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 14px;
                color: var(--muted);
                text-align: center;
                padding: 40px;
                pointer-events: none;
            }
            #emptyState .empty-icon {
                font-size: 52px;
                opacity: 0.4;
            }
            #emptyState p {
                font-size: 14px;
                max-width: 280px;
            }

            /* message bubbles */
            .msg {
                display: flex;
                gap: 10px;
                animation: fadeUp 0.25s ease both;
            }
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .msg.user {
                flex-direction: row-reverse;
            }
            .msg.ai {
                flex-direction: row;
            }

            .avatar {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
            }
            .msg.user .avatar {
                background: var(--primary);
            }
            .msg.ai .avatar {
                background: var(--surface2);
                border: 1px solid var(--border);
            }

            .bubble-wrap {
                display: flex;
                flex-direction: column;
                gap: 4px;
                max-width: calc(100% - 90px);
            }
            .msg.user .bubble-wrap {
                align-items: flex-end;
            }
            .msg.ai .bubble-wrap {
                align-items: flex-start;
            }

            .bubble {
                padding: 10px 14px;
                border-radius: var(--radius);
                font-size: 14.5px;
                line-height: 1.55;
                word-break: break-word;
            }
            .msg.user .bubble {
                background: var(--user-bubble);
                border-bottom-right-radius: 4px;
            }
            .msg.ai .bubble {
                background: var(--ai-bubble);
                border: 1px solid var(--border);
                border-bottom-left-radius: 4px;
            }

            .transcript-label {
                font-size: 11px;
                color: var(--muted);
                padding: 0 4px;
            }

            /* typing indicator */
            .typing {
                display: flex;
                gap: 5px;
                align-items: center;
                padding: 12px 16px;
            }
            .typing span {
                width: 7px;
                height: 7px;
                background: var(--muted);
                border-radius: 50%;
                animation: bounce 1.2s infinite ease-in-out;
            }
            .typing span:nth-child(2) {
                animation-delay: 0.2s;
            }
            .typing span:nth-child(3) {
                animation-delay: 0.4s;
            }
            @keyframes bounce {
                0%,
                60%,
                100% {
                    transform: translateY(0);
                }
                30% {
                    transform: translateY(-6px);
                }
            }

            /* ── Controls ─────────────────────────────────────────────── */
            #controls {
                flex-shrink: 0;
                padding: 20px;
                border-top: 1px solid var(--border);
                background: var(--surface);
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 14px;
            }

            /* canvas waveform */
            #waveCanvas {
                width: 100%;
                max-width: 480px;
                height: 52px;
                border-radius: 10px;
                background: var(--surface2);
                opacity: 0;
                transition: opacity 0.3s;
            }
            #waveCanvas.visible {
                opacity: 1;
            }

            /* mic button */
            #micBtn {
                width: 74px;
                height: 74px;
                border-radius: 50%;
                border: none;
                cursor: pointer;
                background: var(--surface2);
                border: 2px solid var(--border);
                color: var(--text);
                font-size: 28px;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                transition:
                    transform 0.15s,
                    border-color 0.2s,
                    box-shadow 0.2s;
                -webkit-user-select: none;
                user-select: none;
                touch-action: none;
            }
            #micBtn:disabled {
                opacity: 0.35;
                cursor: not-allowed;
            }

            #micBtn:not(:disabled):hover {
                border-color: var(--primary);
                box-shadow: 0 0 0 4px var(--primary-glow);
            }

            #micBtn.recording {
                border-color: var(--danger);
                box-shadow: 0 0 0 6px var(--danger-glow);
                background: #2a1520;
                animation: pulse-ring 1.2s infinite;
            }
            @keyframes pulse-ring {
                0% {
                    box-shadow: 0 0 0 4px var(--danger-glow);
                }
                50% {
                    box-shadow: 0 0 0 12px transparent;
                }
                100% {
                    box-shadow: 0 0 0 4px var(--danger-glow);
                }
            }

            #micBtn.processing {
                border-color: var(--primary);
                animation: spin-border 1s linear infinite;
            }
            @keyframes spin-border {
                from {
                    box-shadow: 0 0 0 3px var(--primary-glow);
                }
                to {
                    box-shadow: 0 0 0 6px transparent;
                }
            }

            #hint {
                font-size: 12px;
                color: var(--muted);
                text-align: center;
                letter-spacing: 0.2px;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <!-- Header -->
            <header>
                <div class="logo">
                    <div class="logo-icon">🎙️</div>
                    Voice AI
                </div>
                <div class="header-right">
                    <button id="resetBtn" title="Clear conversation">
                        ↺ Reset
                    </button>
                    <div id="status" class="connecting">Connecting</div>
                </div>
            </header>

            <!-- Chat messages -->
            <div id="chat">
                <div id="emptyState">
                    <div class="empty-icon">🎧</div>
                    <p>
                        Hold the microphone button and speak. Release to send.
                    </p>
                </div>
            </div>

            <!-- Controls -->
            <div id="controls">
                <canvas id="waveCanvas"></canvas>
                <button id="micBtn" disabled title="Hold to talk">
                    <span id="micIcon">🎤</span>
                </button>
                <div id="hint">Hold to talk</div>
            </div>
        </div>

        <script>
            /* ════════════════════════════════════════════════════════════════
   Config
═══════════════════════════════════════════════════════════════ */
            const WS_URL = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`;

            /* ════════════════════════════════════════════════════════════════
   DOM refs
═══════════════════════════════════════════════════════════════ */
            const $status = document.getElementById("status");
            const $chat = document.getElementById("chat");
            const $empty = document.getElementById("emptyState");
            const $micBtn = document.getElementById("micBtn");
            const $hint = document.getElementById("hint");
            const $resetBtn = document.getElementById("resetBtn");
            const $canvas = document.getElementById("waveCanvas");
            const $ctx = $canvas.getContext("2d");

            /* ════════════════════════════════════════════════════════════════
   State
═══════════════════════════════════════════════════════════════ */
            let ws = null;
            let mediaRecorder = null;
            let audioChunks = [];
            let audioStream = null;
            let analyser = null;
            let animFrameId = null;
            let isRecording = false;
            let isProcessing = false;
            let $typingBubble = null;
            let activeAudioCtx = null; // closed after each recording
            let inputAudioFormat = "pcm16_16000";
            const TARGET_SAMPLE_RATE = 16000;
            const MIN_COMMIT_DURATION_SECONDS = 0.3;

            /* ════════════════════════════════════════════════════════════════
   Status helpers
═══════════════════════════════════════════════════════════════ */
            const STATUS = {
                connecting: ["connecting", "Connecting…"],
                ready: ["ready", "Ready"],
                recording: ["recording", "Recording"],
                processing: ["processing", "Processing"],
                error: ["error", "Error"],
            };

            function setStatus([cls, label]) {
                $status.className = cls;
                $status.textContent = label;
            }

            /* ════════════════════════════════════════════════════════════════
   WebSocket
═══════════════════════════════════════════════════════════════ */
            function connect() {
                setStatus(STATUS.connecting);
                $micBtn.disabled = true;

                ws = new WebSocket(WS_URL);
                ws.binaryType = "arraybuffer";

                ws.onopen = () => {
                    console.log("[ws] connected");
                };

                ws.onmessage = (ev) => {
                    let msg;
                    try {
                        msg = JSON.parse(ev.data);
                    } catch {
                        return;
                    }

                    switch (msg.event) {
                        case "ready":
                            inputAudioFormat =
                                msg.input_audio_format || "pcm16_16000";
                            setStatus(STATUS.ready);
                            $micBtn.disabled = false;
                            setHint("Hold to talk");
                            console.log(
                                `[ws] ready provider=${msg.provider || "unknown"} input_audio_format=${inputAudioFormat}`,
                            );
                            break;

                        case "processing":
                            setStatus(STATUS.processing);
                            setHint("Thinking…");
                            showTyping();
                            break;

                        case "response":
                            setStatus(STATUS.ready);
                            isProcessing = false;
                            setMicState("idle");
                            setHint("Hold to talk");
                            removeTyping();
                            appendMessage("user", msg.transcript, null);
                            appendMessage("ai", msg.text, null);
                            if (msg.audio)
                                playAudioBase64(msg.audio, msg.format || "mp3");
                            break;

                        case "no_speech":
                            setStatus(STATUS.ready);
                            isProcessing = false;
                            setMicState("idle");
                            setHint("No speech detected, try again");
                            removeTyping();
                            setTimeout(() => setHint("Hold to talk"), 1800);
                            break;

                        case "reset_ok":
                            clearChat();
                            setStatus(STATUS.ready);
                            setHint("Hold to talk");
                            break;

                        case "pong":
                            break;

                        case "error":
                            setStatus(STATUS.error);
                            isProcessing = false;
                            setMicState("idle");
                            setHint("Hold to talk");
                            removeTyping();
                            appendErrorMsg(msg.message || "Unknown error");
                            setTimeout(() => setStatus(STATUS.ready), 3000);
                            break;
                    }
                };

                ws.onclose = () => {
                    console.log("[ws] closed — reconnecting in 2 s");
                    $micBtn.disabled = true;
                    setStatus(STATUS.connecting);
                    setTimeout(connect, 2000);
                };

                ws.onerror = (e) => {
                    console.error("[ws] error", e);
                    ws.close();
                };
            }

            /* ════════════════════════════════════════════════════════════════
   Microphone / recording
═══════════════════════════════════════════════════════════════ */
            async function ensureStream() {
                if (audioStream && audioStream.active) return audioStream;
                audioStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        channelCount: 1,
                        autoGainControl: true,
                        echoCancellation: true,
                        noiseSuppression: true,
                    },
                });
                return audioStream;
            }

            async function startRecording() {
                if (isRecording || isProcessing) return;
                if (!ws || ws.readyState !== WebSocket.OPEN) return;

                try {
                    const stream = await ensureStream();
                    setStatus(STATUS.recording);
                    setMicState("recording");
                    setHint("Listening… release to send");
                    isRecording = true;
                    audioChunks = [];

                    // Waveform analyser — one AudioContext per recording, closed on stop
                    activeAudioCtx = new (
                        window.AudioContext || window.webkitAudioContext
                    )();
                    const source =
                        activeAudioCtx.createMediaStreamSource(stream);
                    analyser = activeAudioCtx.createAnalyser();
                    analyser.fftSize = 256;
                    source.connect(analyser);
                    drawWaveform();

                    // MediaRecorder — prefer webm/opus, fall back to first supported
                    const mimeType = pickMime([
                        "audio/webm;codecs=opus",
                        "audio/webm",
                        "audio/ogg;codecs=opus",
                    ]);
                    mediaRecorder = new MediaRecorder(
                        stream,
                        mimeType ? { mimeType } : {},
                    );

                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0) audioChunks.push(e.data);
                    };

                    mediaRecorder.onstop = () => {
                        stopWaveform();
                        if (activeAudioCtx) {
                            activeAudioCtx.close().catch(() => {});
                            activeAudioCtx = null;
                        }
                        const finalMime =
                            mediaRecorder.mimeType || mimeType || "audio/webm";
                        const blob = new Blob(audioChunks, { type: finalMime });
                        console.log(
                            `[mic] sending blob: ${blob.size} bytes, type=${finalMime}`,
                        );
                        sendAudio(blob).catch((err) => {
                            console.error("[mic] failed to send audio:", err);
                        });
                    };

                    mediaRecorder.start(100); // collect in 100 ms chunks
                } catch (err) {
                    console.error("[mic] error:", err);
                    isRecording = false;
                    setStatus(STATUS.error);
                    setHint(
                        err.name === "NotAllowedError"
                            ? "Microphone permission denied"
                            : "Microphone error",
                    );
                    setTimeout(() => {
                        setStatus(STATUS.ready);
                        setHint("Hold to talk");
                    }, 3500);
                }
            }

            function stopRecording() {
                if (!isRecording) return;
                isRecording = false;
                isProcessing = true;

                if (mediaRecorder && mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                }
            }

            async function sendAudio(blob) {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    isProcessing = false;
                    setMicState("idle");
                    setStatus(STATUS.ready);
                    return;
                }

                try {
                    if (inputAudioFormat === "webm") {
                        const webmBytes = await blob.arrayBuffer();
                        if (!ws || ws.readyState !== WebSocket.OPEN) {
                            isProcessing = false;
                            setMicState("idle");
                            setStatus(STATUS.ready);
                            return;
                        }
                        ws.send(webmBytes);
                        console.log(
                            `[mic] sent webm: ${webmBytes.byteLength} bytes`,
                        );
                        return;
                    }

                    const pcmBytes = await convertBlobToPCM16(
                        blob,
                        TARGET_SAMPLE_RATE,
                    );
                    const durationSeconds =
                        pcmBytes.byteLength / 2 / TARGET_SAMPLE_RATE;

                    if (durationSeconds < MIN_COMMIT_DURATION_SECONDS) {
                        isProcessing = false;
                        setMicState("idle");
                        setStatus(STATUS.ready);
                        setHint("Clip too short, hold a bit longer");
                        appendErrorMsg(
                            "Audio clip was too short for ElevenLabs commit. Hold the mic for at least ~0.3s.",
                        );
                        console.log(
                            `[mic] clip too short: ${durationSeconds.toFixed(2)}s`,
                        );
                        setTimeout(() => setHint("Hold to talk"), 2200);
                        return;
                    }

                    if (isMostlySilentPCM16(pcmBytes)) {
                        isProcessing = false;
                        setMicState("idle");
                        setStatus(STATUS.ready);
                        setHint("Captured audio looks silent");
                        appendErrorMsg(
                            "Microphone audio was near-silent. Check input device/permissions and try again.",
                        );
                        setTimeout(() => setHint("Hold to talk"), 2500);
                        return;
                    }

                    if (!ws || ws.readyState !== WebSocket.OPEN) {
                        isProcessing = false;
                        setMicState("idle");
                        setStatus(STATUS.ready);
                        return;
                    }

                    ws.send(pcmBytes); // Uint8Array (16-bit PCM LE)
                    console.log(
                        `[mic] sent pcm: ${pcmBytes.byteLength} bytes @ ${TARGET_SAMPLE_RATE}Hz`,
                    );
                } catch (err) {
                    isProcessing = false;
                    setMicState("idle");
                    setStatus(STATUS.error);
                    setHint("Audio conversion failed");
                    appendErrorMsg(
                        "Could not convert microphone audio to PCM 16k.",
                    );
                    console.error("[mic] audio conversion error:", err);
                    setTimeout(() => {
                        setStatus(STATUS.ready);
                        setHint("Hold to talk");
                    }, 3000);
                }
            }

            function pickMime(candidates) {
                return (
                    candidates.find((m) => MediaRecorder.isTypeSupported(m)) ||
                    ""
                );
            }

            async function convertBlobToPCM16(blob, targetSampleRate) {
                const sourceBuffer = await blob.arrayBuffer();
                const decodeCtx = new (
                    window.AudioContext || window.webkitAudioContext
                )();

                try {
                    const decoded = await decodeCtx.decodeAudioData(
                        sourceBuffer.slice(0),
                    );
                    const mono = mixToMono(decoded);
                    const decodedRMS = calculateRMS(mono);
                    const resampled = await resamplePCM(
                        mono,
                        decoded.sampleRate,
                        targetSampleRate,
                    );
                    const resampledRMS = calculateRMS(resampled);
                    console.log(
                        `[mic] decoded sr=${decoded.sampleRate} ch=${decoded.numberOfChannels} len=${decoded.length} rms=${decodedRMS.toFixed(6)} resampled_rms=${resampledRMS.toFixed(6)}`,
                    );
                    return floatToPCM16LE(resampled);
                } finally {
                    decodeCtx.close().catch(() => {});
                }
            }

            function mixToMono(audioBuffer) {
                const channels = audioBuffer.numberOfChannels;
                if (channels <= 1) {
                    return new Float32Array(audioBuffer.getChannelData(0));
                }

                // Some devices expose stereo channels with phase differences.
                // Pick the strongest channel to avoid cancellation artifacts.
                let bestChannel = 0;
                let bestRMS = 0;
                for (let ch = 0; ch < channels; ch++) {
                    const rms = calculateRMS(audioBuffer.getChannelData(ch));
                    if (rms > bestRMS) {
                        bestRMS = rms;
                        bestChannel = ch;
                    }
                }
                return new Float32Array(audioBuffer.getChannelData(bestChannel));
            }

            async function resamplePCM(samples, fromRate, toRate) {
                if (fromRate === toRate) {
                    return samples;
                }

                const OfflineCtx =
                    window.OfflineAudioContext ||
                    window.webkitOfflineAudioContext;
                if (!OfflineCtx) {
                    return linearResample(samples, fromRate, toRate);
                }

                const frameCount = Math.max(
                    1,
                    Math.round((samples.length * toRate) / fromRate),
                );
                const offlineCtx = new OfflineCtx(1, frameCount, toRate);
                const inBuffer = offlineCtx.createBuffer(
                    1,
                    samples.length,
                    fromRate,
                );
                inBuffer.copyToChannel(samples, 0);

                const source = offlineCtx.createBufferSource();
                source.buffer = inBuffer;
                source.connect(offlineCtx.destination);
                source.start(0);

                const outBuffer = await offlineCtx.startRendering();
                return new Float32Array(outBuffer.getChannelData(0));
            }

            function linearResample(samples, fromRate, toRate) {
                const outLength = Math.max(
                    1,
                    Math.round((samples.length * toRate) / fromRate),
                );
                const out = new Float32Array(outLength);
                const ratio = fromRate / toRate;
                for (let i = 0; i < outLength; i++) {
                    const inPos = i * ratio;
                    const left = Math.floor(inPos);
                    const right = Math.min(left + 1, samples.length - 1);
                    const t = inPos - left;
                    out[i] = samples[left] * (1 - t) + samples[right] * t;
                }
                return out;
            }

            function floatToPCM16LE(samples) {
                const bytes = new ArrayBuffer(samples.length * 2);
                const view = new DataView(bytes);
                for (let i = 0; i < samples.length; i++) {
                    const s = Math.max(-1, Math.min(1, samples[i]));
                    const v = s < 0 ? s * 0x8000 : s * 0x7fff;
                    view.setInt16(i * 2, v, true);
                }
                return new Uint8Array(bytes);
            }

            function calculateRMS(samples) {
                if (!samples || samples.length === 0) return 0;
                let sum = 0;
                for (let i = 0; i < samples.length; i++) {
                    const v = samples[i];
                    sum += v * v;
                }
                return Math.sqrt(sum / samples.length);
            }

            function isMostlySilentPCM16(bytes) {
                if (!bytes || bytes.byteLength < 4) return true;
                const view = new DataView(
                    bytes.buffer,
                    bytes.byteOffset,
                    bytes.byteLength,
                );
                const totalSamples = Math.floor(bytes.byteLength / 2);
                let nonZero = 0;
                let absSum = 0;
                for (let i = 0; i < totalSamples; i++) {
                    const v = view.getInt16(i * 2, true);
                    if (v !== 0) nonZero++;
                    absSum += Math.abs(v);
                }
                const nonZeroRatio = nonZero / totalSamples;
                const avgAmplitude = absSum / totalSamples;
                console.log(
                    `[mic] pcm stats samples=${totalSamples} nonZeroRatio=${nonZeroRatio.toFixed(4)} avgAmp=${avgAmplitude.toFixed(2)}`,
                );
                return nonZeroRatio < 0.01 || avgAmplitude < 10;
            }

            const $micIcon = document.getElementById("micIcon");

            /* ════════════════════════════════════════════════════════════════
   Audio playback
═══════════════════════════════════════════════════════════════ */
            function playAudioBase64(b64, format) {
                try {
                    const binary = atob(b64);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++)
                        bytes[i] = binary.charCodeAt(i);

                    const mimeMap = {
                        mp3: "audio/mpeg",
                        wav: "audio/wav",
                        ogg: "audio/ogg",
                        mp4: "audio/mp4",
                    };
                    const mime = mimeMap[format] || "audio/mpeg";
                    const blob = new Blob([bytes], { type: mime });
                    const url = URL.createObjectURL(blob);
                    const audio = new Audio(url);

                    audio.onended = () => URL.revokeObjectURL(url);
                    audio.onerror = (e) => {
                        console.error("[audio] playback error", e);
                        URL.revokeObjectURL(url);
                    };
                    audio.play().catch(console.error);
                } catch (err) {
                    console.error("[audio] decode error:", err);
                }
            }

            /* ════════════════════════════════════════════════════════════════
   Waveform visualiser
═══════════════════════════════════════════════════════════════ */
            function drawWaveform() {
                $canvas.classList.add("visible");
                const dpr = window.devicePixelRatio || 1;
                $canvas.width = $canvas.clientWidth * dpr;
                $canvas.height = $canvas.clientHeight * dpr;
                $ctx.scale(dpr, dpr);

                const W = $canvas.clientWidth;
                const H = $canvas.clientHeight;
                const buf = new Uint8Array(analyser.frequencyBinCount);

                function frame() {
                    animFrameId = requestAnimationFrame(frame);
                    analyser.getByteTimeDomainData(buf);

                    $ctx.clearRect(0, 0, W, H);
                    $ctx.lineWidth = 2;
                    $ctx.strokeStyle = getComputedStyle(
                        document.documentElement,
                    )
                        .getPropertyValue("--danger")
                        .trim();
                    $ctx.shadowBlur = 8;
                    $ctx.shadowColor = getComputedStyle(
                        document.documentElement,
                    )
                        .getPropertyValue("--danger-glow")
                        .trim();
                    $ctx.beginPath();

                    const sliceW = W / buf.length;
                    let x = 0;
                    for (let i = 0; i < buf.length; i++) {
                        const v = buf[i] / 128.0;
                        const y = (v * H) / 2;
                        i === 0 ? $ctx.moveTo(x, y) : $ctx.lineTo(x, y);
                        x += sliceW;
                    }
                    $ctx.lineTo(W, H / 2);
                    $ctx.stroke();
                }

                frame();
            }

            function stopWaveform() {
                if (animFrameId) {
                    cancelAnimationFrame(animFrameId);
                    animFrameId = null;
                }
                $ctx.clearRect(0, 0, $canvas.width, $canvas.height);
                $canvas.classList.remove("visible");
            }

            /* ════════════════════════════════════════════════════════════════
   Chat UI
═══════════════════════════════════════════════════════════════ */
            function appendMessage(role, text, label) {
                if (!text || !text.trim()) return;
                hideEmpty();

                const msg = document.createElement("div");
                msg.className = `msg ${role}`;

                const avatar = document.createElement("div");
                avatar.className = "avatar";
                avatar.textContent = role === "user" ? "🧑" : "🤖";

                const wrap = document.createElement("div");
                wrap.className = "bubble-wrap";

                if (label) {
                    const lbl = document.createElement("div");
                    lbl.className = "transcript-label";
                    lbl.textContent = label;
                    wrap.appendChild(lbl);
                }

                const bubble = document.createElement("div");
                bubble.className = "bubble";
                bubble.textContent = text;
                wrap.appendChild(bubble);

                msg.appendChild(avatar);
                msg.appendChild(wrap);
                $chat.appendChild(msg);
                scrollBottom();
            }

            function appendErrorMsg(text) {
                hideEmpty();
                const div = document.createElement("div");
                div.style.cssText =
                    "color:#ff4f70;font-size:13px;text-align:center;padding:6px 12px;";
                div.textContent = "⚠ " + text;
                $chat.appendChild(div);
                scrollBottom();
            }

            function showTyping() {
                if ($typingBubble) return;
                hideEmpty();

                $typingBubble = document.createElement("div");
                $typingBubble.className = "msg ai";
                $typingBubble.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble-wrap">
      <div class="bubble typing">
        <span></span><span></span><span></span>
      </div>
    </div>`;
                $chat.appendChild($typingBubble);
                scrollBottom();
            }

            function removeTyping() {
                if ($typingBubble) {
                    $typingBubble.remove();
                    $typingBubble = null;
                }
            }

            function clearChat() {
                $chat.innerHTML = "";
                $chat.appendChild($empty);
                $empty.style.display = "";
            }

            function hideEmpty() {
                $empty.style.display = "none";
            }

            function scrollBottom() {
                $chat.scrollTop = $chat.scrollHeight;
            }

            /* ════════════════════════════════════════════════════════════════
   Mic button visual state
═══════════════════════════════════════════════════════════════ */
            function setMicState(state) {
                $micBtn.classList.remove("recording", "processing");
                if (state === "recording") {
                    $micBtn.classList.add("recording");
                    $micIcon.textContent = "⏹";
                } else if (state === "processing") {
                    $micBtn.classList.add("processing");
                    $micIcon.textContent = "⏳";
                } else {
                    $micIcon.textContent = "🎤";
                }
            }

            function setHint(text) {
                $hint.textContent = text;
            }

            /* ════════════════════════════════════════════════════════════════
   Mic button events — support both mouse and touch
═══════════════════════════════════════════════════════════════ */
            function onPressStart(e) {
                e.preventDefault();
                if ($micBtn.disabled || isProcessing) return;
                startRecording();
            }

            function onPressEnd(e) {
                e.preventDefault();
                if (isRecording) stopRecording();
            }

            // mousedown on the button starts recording.
            // mouseup is on the document so releasing anywhere — even after the
            // cursor drifts off the button mid-speech — always stops the recording.
            // mouseleave is intentionally NOT used: it was cutting recordings short
            // the instant the cursor moved a pixel off the button.
            $micBtn.addEventListener("mousedown", onPressStart);
            document.addEventListener("mouseup", onPressEnd);
            $micBtn.addEventListener("touchstart", onPressStart, {
                passive: false,
            });
            $micBtn.addEventListener("touchend", onPressEnd, {
                passive: false,
            });
            $micBtn.addEventListener("touchcancel", onPressEnd, {
                passive: false,
            });

            /* ════════════════════════════════════════════════════════════════
   Reset button
═══════════════════════════════════════════════════════════════ */
            $resetBtn.addEventListener("click", () => {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;
                ws.send(JSON.stringify({ event: "reset" }));
            });

            /* ════════════════════════════════════════════════════════════════
   Keyboard shortcut — hold Space to talk
═══════════════════════════════════════════════════════════════ */
            let spaceHeld = false;
            document.addEventListener("keydown", (e) => {
                if (e.code === "Space" && !e.repeat && !spaceHeld) {
                    spaceHeld = true;
                    if (!$micBtn.disabled && !isProcessing) startRecording();
                }
            });
            document.addEventListener("keyup", (e) => {
                if (e.code === "Space") {
                    spaceHeld = false;
                    if (isRecording) stopRecording();
                }
            });

            /* ════════════════════════════════════════════════════════════════
   Heartbeat ping every 25 s to keep WS alive
═══════════════════════════════════════════════════════════════ */
            setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ event: "ping" }));
                }
            }, 25000);

            /* ════════════════════════════════════════════════════════════════
   Boot
═══════════════════════════════════════════════════════════════ */
            connect();
        </script>
    </body>
</html>
